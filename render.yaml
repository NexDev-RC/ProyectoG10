services:
  # 1. API REST (FastAPI)
  - type: web
    name: olist-api
    env: docker
    # Render inyecta automáticamente la variable $PORT
    dockerCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT

  # 2. Dashboard (Streamlit)
  - type: web
    name: olist-dashboard
    env: docker
    dockerCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      # Le pasamos la URL de la API al Dashboard automáticamente
      - key: API_URL 
        fromService:
          type: web
          name: olist-api
          envVarKey: RENDER_EXTERNAL_URL

  # 3. MLflow UI
  - type: web
    name: olist-mlflow
    env: docker
    dockerCommand: mlflow ui --host 0.0.0.0 --port $PORT --backend-store-uri /app/mlruns